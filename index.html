   REWARDS
===================================================================== */

const REWARD_EMOJIS = ['🎁','📱','💰','🎬','🍕','🌙','👫','🍦','🛍️','🎮','🚗','🎪','🏖️','🎨','🎵','🍰','🎭','🎳','🏀','🎠','🃏','🧸','🎡','🏆'];

function _rewardModalHTML(rw) {
  const r = rw || {};
  const isGroup = r.isGroup || false;
  return `
    <div class="form-group">
      <label class="form-label">${t('rewardTypeField')}</label>
      <div class="choice-grid choice-grid-2">
        <button type="button" class="choice-btn${!isGroup?' sel-active':''}" id="rwtype-individual" onclick="selectRewardType('individual')">${t('individualType')}</button>
        <button type="button" class="choice-btn${isGroup?' sel-active':''}" id="rwtype-group" onclick="selectRewardType('group')">${t('groupType')}</button>
      </div>
      <input type="hidden" id="rw-isgroup" value="${isGroup?'1':'0'}">
    </div>
    <div class="form-group">
      <label class="form-label">${t('iconField')}</label>
      <div class="emoji-picker" id="rw-icon-picker">
        ${REWARD_EMOJIS.map(e => `<div class="emoji-option${e===(r.icon||'🎁')?' selected':''}" onclick="selectRewardIcon('${e}',this)">${e}</div>`).join('')}
      </div>
      <input type="hidden" id="rw-icon" value="${r.icon||'🎁'}">
    </div>
    <div class="form-group">
      <label class="form-label">${t('rewardNameField')}</label>
      <input type="text" class="form-input" id="rw-title" value="${esc(r.title||'')}" placeholder="${_lang==='he'?'למשל: 30 דקות מסך נוסף':'e.g. 30 min extra screen time'}">
      <span class="form-error" id="rw-title-err">${_lang==='he'?'נא להזין שם':'Please enter a name'}</span>
    </div>
    <div class="form-group">
      <label class="form-label">${t('descField')}</label>
      <input type="text" class="form-input" id="rw-desc" value="${esc(r.description||'')}" placeholder="${_lang==='he'?'פרטים נוספים...':'Extra details...'}">
    </div>
    <div class="form-group">
      <label class="form-label" id="rw-cost-label">${isGroup ? t('goalCostField') : t('costField')}</label>
      <div style="display:flex;align-items:center;gap:10px;">
        <button type="button" onclick="adjustRewardCost(-1)" style="width:36px;height:36px;border-radius:50%;border:2px solid var(--border);background:white;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;">−</button>
        <input type="number" class="form-input" id="rw-cost" value="${r.cost||5}" min="1" max="999" style="text-align:center;font-family:'Nunito',sans-serif;font-weight:800;font-size:1.3rem;width:90px;">
        <button type="button" onclick="adjustRewardCost(1)" style="width:36px;height:36px;border-radius:50%;border:2px solid var(--border);background:white;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;">+</button>
        <span style="font-size:1.1rem;">⭐</span>
      </div>
      <div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;">
        ${[3,5,8,10,15,20,25,30,50].map(n=>`<button type="button" onclick="document.getElementById('rw-cost').value=${n}" style="padding:4px 10px;border-radius:50px;border:1.5px solid var(--border);background:white;font-family:'Nunito',sans-serif;font-weight:700;font-size:0.8rem;cursor:pointer;">${n} ⭐</button>`).join('')}
      </div>
      <span class="form-error" id="rw-cost-err">Please enter a valid cost (1–999)</span>
    </div>`;
}

function selectRewardType(type) {
  document.getElementById('rw-isgroup').value = type === 'group' ? '1' : '0';
  document.getElementById('rwtype-individual').className = 'choice-btn' + (type === 'individual' ? ' sel-active' : '');
  document.getElementById('rwtype-group').className      = 'choice-btn' + (type === 'group'      ? ' sel-active' : '');
  const lbl = document.getElementById('rw-cost-label');
  if (lbl) lbl.textContent = type === 'group' ? t('goalCostField') : t('costField');
}

function selectRewardIcon(icon, el) {
  document.querySelectorAll('#rw-icon-picker .emoji-option').forEach(e => e.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById('rw-icon').value = icon;
}

function adjustRewardCost(delta) {
  const el = document.getElementById('rw-cost');
  if (!el) return;
  const val = Math.max(1, Math.min(999, (parseInt(el.value) || 0) + delta));
  el.value = val;
}

function openAddReward() {
  openModal(_rewardModalHTML(null) + `<button class="btn btn-primary btn-full" style="margin-top:8px;" onclick="doSaveReward(null)">${t('addRewardBtn')}</button>`, t('newReward'));
}

function openEditReward(rewardId) {
  const rw = (State.data.rewards||[]).find(r => r.id === rewardId);
  if (!rw) return;
  openModal(_rewardModalHTML(rw) + `<button class="btn btn-primary btn-full" style="margin-top:8px;" onclick="doSaveReward('${rewardId}')">${t('saveChangesBtn')}</button>`, t('editReward'));
}

function doSaveReward(editId) {
  const title = document.getElementById('rw-title').value.trim();
  const cost  = parseInt(document.getElementById('rw-cost').value);
  let valid = true;
  if (!title) {
    document.getElementById('rw-title').classList.add('error');
    document.getElementById('rw-title-err').classList.add('show');
    valid = false;
  } else {
    document.getElementById('rw-title').classList.remove('error');
    document.getElementById('rw-title-err').classList.remove('show');
  }
  if (!cost || cost < 1 || cost > 999) {
    document.getElementById('rw-cost').classList.add('error');
    document.getElementById('rw-cost-err').classList.add('show');
    valid = false;
  } else {
    document.getElementById('rw-cost').classList.remove('error');
    document.getElementById('rw-cost-err').classList.remove('show');
  }
  if (!valid) return;

  const reward = {
    id: editId || genId(),
    icon:        document.getElementById('rw-icon').value || '🎁',
    title,
    description: document.getElementById('rw-desc').value.trim(),
    cost,
    isGroup:     document.getElementById('rw-isgroup').value === '1',
    isActive:    editId ? ((State.data.rewards||[]).find(r=>r.id===editId)||{}).isActive !== false : true
  };
  if (!State.data.rewards) State.data.rewards = [];
  if (editId) {
    const idx = State.data.rewards.findIndex(r => r.id === editId);
    if (idx !== -1) State.data.rewards[idx] = reward;
  } else {
    State.data.rewards.push(reward);
  }
  State.save();
  closeModal();
  showToast(editId ? (_lang==='he'?'✏️ הפרס עודכן!':'✏️ Reward updated!') : (_lang==='he'?'🎁 פרס נוסף!':'🎁 Reward added!'));
  switchTab('rewards');
}

function doDeleteReward(rewardId) {
  if (!confirm(_lang==='he'?'למחוק את הפרס? הילדים לא יוכלו לממש אותו יותר.':'Delete this reward? Children will no longer be able to redeem it.')) return;
  State.data.rewards = (State.data.rewards||[]).filter(r => r.id !== rewardId);
  State.data.redemptions = (State.data.redemptions||[]).filter(r => r.rewardId !== rewardId);
  State.save();
  showToast(_lang==='he'?'🗑️ הפרס נמחק':'🗑️ Reward deleted');
  switchTab('rewards');
}

function doToggleReward(rewardId) {
  const rw = (State.data.rewards||[]).find(r => r.id === rewardId);
  if (!rw) return;
  rw.isActive = !rw.isActive;
  State.save();
  showToast(rw.isActive ? (_lang==='he'?'👁️ הפרס הופעל':'👁️ Reward activated') : (_lang==='he'?'🚫 הפרס הוסתר מהחנות':'🚫 Reward hidden from store'));
  switchTab('rewards');
}

function doRedeemReward(rewardId, childId) {
  const child = State.getChild(childId);
  const rw = (State.data.rewards||[]).find(r => r.id === rewardId);
  if (!child || !rw) return;
  if (child.totalPoints < rw.cost) {
    showToast(_lang==='he'?`❌ אין מספיק כוכבים! חסרים עוד ${rw.cost - child.totalPoints} ⭐`:`❌ Not enough stars! Need ${rw.cost - child.totalPoints} more ⭐`);
    return;
  }
  const alreadyPending = (State.data.redemptions||[]).find(
    r => r.rewardId === rewardId && r.childId === childId && r.status === 'pending'
  );
  if (alreadyPending) {
    showToast(_lang==='he'?'⏳ כבר יש לך בקשת מימוש ממתינה לפרס זה':'⏳ You already have a pending request for this reward');
    return;
  }
  if (!State.data.redemptions) State.data.redemptions = [];
  State.data.redemptions.push({
    id: genId(), rewardId, childId,
    status: 'pending', reply: '',
    createdAt: Date.now()
  });
  State.save();
  spawnConfetti();
  showToast(_lang==='he'?`🎁 בקשת מימוש נשלחה עבור "${rw.title}"!`:`🎁 Redemption request sent for "${rw.title}"!`);
  Router.navigate('child-rewards', { childId }, false);
}

/* --- GROUP REWARDS --- */

function openContributeModal(rewardId, childId) {
  const child  = State.getChild(childId);
  const rw     = State.getReward(rewardId);
  if (!child || !rw) return;
  const prog     = State.getGroupProgress(rewardId);
  const myContrib = prog.contributions.find(c => c.childId === childId);
  const remaining = rw.cost - prog.total + (myContrib ? myContrib.amount : 0);
  const maxContrib = Math.min(child.totalPoints, remaining > 0 ? remaining : child.totalPoints);

  openModal(`
    <div style="text-align:center;margin-bottom:16px;">
      <div style="font-size:2.5rem;">${rw.icon}</div>
      <div style="font-family:'Nunito',sans-serif;font-weight:700;font-size:1rem;margin-top:6px;">${esc(rw.title)}</div>
      <div style="font-size:0.83rem;color:var(--muted);margin-top:4px;">${t('familyGoal')} ${rw.cost} ⭐ &nbsp;·&nbsp; ${t('collectedSoFar')} ${prog.total} ⭐</div>
    </div>
    <div class="form-group">
      <label class="form-label">${t('yourContrib').replace('{n}', child.totalPoints)}</label>
      <div style="display:flex;align-items:center;gap:10px;">
        <button type="button" onclick="adjustContrib(-1)" style="width:38px;height:38px;border-radius:50%;border:2px solid var(--border);background:white;font-size:1.3rem;cursor:pointer;flex-shrink:0;">−</button>
        <input type="number" class="form-input" id="contrib-amount" value="${myContrib ? myContrib.amount : Math.min(5, maxContrib)}" min="1" max="${maxContrib}" style="text-align:center;font-family:'Nunito',sans-serif;font-weight:800;font-size:1.5rem;">
        <button type="button" onclick="adjustContrib(1)" style="width:38px;height:38px;border-radius:50%;border:2px solid var(--border);background:white;font-size:1.3rem;cursor:pointer;flex-shrink:0;">+</button>
        <span style="font-size:1.2rem;flex-shrink:0;">⭐</span>
      </div>
      <div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;">
        ${[1,3,5,10].filter(n=>n<=maxContrib).map(n=>`<button type="button" onclick="document.getElementById('contrib-amount').value=${n}" style="padding:4px 10px;border-radius:50px;border:1.5px solid var(--border);background:white;font-family:'Nunito',sans-serif;font-weight:700;font-size:0.8rem;cursor:pointer;">${n} ⭐</button>`).join('')}
        ${maxContrib > 0 ? `<button type="button" onclick="document.getElementById('contrib-amount').value=${maxContrib}" style="padding:4px 10px;border-radius:50px;border:1.5px solid var(--teal);background:#E8FBFA;font-family:'Nunito',sans-serif;font-weight:700;font-size:0.8rem;cursor:pointer;color:#0d7a75;">${_lang==='he'?`הכל (${maxContrib}) ⭐`:`All (${maxContrib}) ⭐`}</button>` : ''}
      </div>
      <span class="form-error" id="contrib-err">${_lang==='he'?`הכנס סכום בין 1 ל-${maxContrib}`:`Please enter an amount between 1 and ${maxContrib}`}</span>
    </div>
    <button class="btn btn-child btn-full" onclick="doContributeToGroup('${rewardId}','${childId}')">
      ${t('confirmContrib')}
    </button>
  `, t('contributeToGoal'));
}

function adjustContrib(delta) {
  const el = document.getElementById('contrib-amount');
  if (!el) return;
  el.value = Math.max(1, (parseInt(el.value)||0) + delta);
}

function doContributeToGroup(rewardId, childId) {
  const child  = State.getChild(childId);
  const rw     = State.getReward(rewardId);
  if (!child || !rw) return;
  const amount = parseInt(document.getElementById('contrib-amount').value);
  if (!amount || amount < 1 || amount > child.totalPoints) {
    document.getElementById('contrib-amount').classList.add('error');
    document.getElementById('contrib-err').classList.add('show');
    return;
  }
  if (!State.data.redemptions) State.data.redemptions = [];
  let rd = State.getGroupRedemption(rewardId);
  if (!rd) {
    rd = { id: genId(), rewardId, isGroup: true, contributions: [], status: 'collecting', createdAt: Date.now() };
    State.data.redemptions.push(rd);
  }
  const existing = rd.contributions.find(c => c.childId === childId);
  if (existing) {
    existing.amount = amount;
  } else {
    rd.contributions.push({ childId, amount });
  }
  State.save();
  closeModal();
  const total = rd.contributions.reduce((s,c) => s+c.amount, 0);
  const goalMet = total >= rw.cost;
  if (goalMet) spawnConfetti();
  showToast(goalMet
    ? (_lang==='he'?`🎉 היעד המשפחתי הושג! בקש מהורה לאשר "${rw.title}"!`:`🎉 Family goal reached! Ask a parent to approve "${rw.title}"!`)
    : (_lang==='he'?`⭐ תרמת ${amount} כוכבים! נדרשים עוד ${rw.cost - total}.`:`⭐ You're contributing ${amount} stars! ${rw.cost - total} more needed.`)
  );
  Router.navigate('child-rewards', { childId }, false);
}

function doApproveGroupReward(rdId) {
  const rd = (State.data.redemptions||[]).find(r => r.id === rdId);
  if (!rd) return;
  const rw = State.getReward(rd.rewardId);
  if (!rw) return;
  rd.contributions.forEach(c => {
    const child = State.getChild(c.childId);
    if (child) child.totalPoints = Math.max(0, child.totalPoints - c.amount);
  });
  rd.status = 'approved';
  rd.resolvedAt = Date.now();
  logHistory('reward', '🎡', `Approved family reward "${rw.title}" — goal reached together!`, null);
  State.save();
  spawnConfetti();
  showToast(_lang==='he'?`🎉 פרס משפחתי אושר! "${rw.title}" נפתח!`:`🎉 Family reward approved! "${rw.title}" unlocked!`);
  switchTab('rewards');
}

function doRejectGroupReward(rdId) {
  const rd = (State.data.redemptions||[]).find(r => r.id === rdId);
  if (!rd) return;
  rd.status = 'rejected';
  rd.resolvedAt = Date.now();
  State.save();
  showToast(_lang==='he'?'פרס משפחתי בוטל — התרומות הוחזרו':'Group reward cancelled — contributions have been returned');
  switchTab('rewards');
}

function doApproveRedemption(rdId) {
  const rd = (State.data.redemptions||[]).find(r => r.id === rdId);
  if (!rd) return;
  const rw = (State.data.rewards||[]).find(r => r.id === rd.rewardId);
  const child = State.getChild(rd.childId);
  if (!rw || !child) return;
  if (child.totalPoints < rw.cost) {
    showToast(_lang==='he'?`❌ ל${child.name} יש רק ${child.totalPoints} ⭐ — לא מספיק לפרס זה`:`❌ ${child.name} only has ${child.totalPoints} ⭐ — not enough for this reward`);
    return;
  }
  rd.status = 'approved';
  rd.resolvedAt = Date.now();
  child.totalPoints -= rw.cost;
  logHistory('reward', '🎁', `Approved reward "${rw.title}" for ${child.name} (−${rw.cost} ⭐)`, child.id);
  State.save();
  showToast(_lang==='he'?`✅ אושר! ${child.emoji} ${child.name} הוציא ${rw.cost} ⭐ על "${rw.title}"`:`✅ Approved! ${child.emoji} ${child.name} spent ${rw.cost} ⭐ on "${rw.title}"`);
  switchTab('rewards');
}

function doRejectRedemption(rdId) {
  const rd = (State.data.redemptions||[]).find(r => r.id === rdId);
  if (!rd) return;
  const child = State.getChild(rd.childId);
  rd.status = 'rejected';
  rd.resolvedAt = Date.now();
  State.save();
  showToast(_lang==='he'?'המימוש נדחה':'Redemption rejected');
  switchTab('rewards');
}

/* =====================================================================
   BOOT
===================================================================== */
document.addEventListener('DOMContentLoaded', async function() {
  document.getElementById('app').setAttribute('dir', _lang === 'he' ? 'rtl' : 'ltr');
  await State.load();
  Router.navigate('home');
  startNotificationChecker();
});
</script>
</body>
</html>
