<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Family Hub 🏠</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <style>
    /* ===== RESET & BASE ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #F5F0EB;
      color: #2D3436;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ===== CSS VARIABLES ===== */
    :root {
      --coral: #FF6B6B;
      --orange: #FF8E53;
      --teal: #4ECDC4;
      --blue: #45B7D1;
      --green: #6BCB77;
      --yellow: #FFD166;
      --purple: #C084FC;
      --bg: #FFF9F5;
      --card: #FFFFFF;
      --text: #2D3436;
      --muted: #636E72;
      --light: #F1F3F4;
      --border: #E8ECEF;
      --radius: 16px;
      --radius-sm: 10px;
      --shadow: 0 4px 20px rgba(0,0,0,0.08);
      --shadow-sm: 0 2px 8px rgba(0,0,0,0.06);
    }

    /* ===== APP SHELL ===== */
    #app {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      background: var(--bg);
      position: relative;
      box-shadow: 0 0 40px rgba(0,0,0,0.12);
    }

    /* ===== VIEWS ===== */
    .view {
      display: none;
      min-height: 100vh;
      animation: fadeIn 0.25s ease;
    }
    .view.active { display: block; }

    /* ===== TOP HEADER BAR ===== */
    .view-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 18px 20px 14px;
      background: var(--bg);
      position: sticky;
      top: 0;
      z-index: 10;
      border-bottom: 1px solid var(--border);
    }
    .view-header h2 {
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 1.35rem;
      flex: 1;
    }
    .btn-back {
      background: var(--light);
      border: none;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      flex-shrink: 0;
    }
    .btn-back:hover { background: var(--border); }

    /* ===== CARDS ===== */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      padding: 16px;
      margin-bottom: 12px;
    }
    .card-title {
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      margin-bottom: 4px;
    }
    .card-desc { color: var(--muted); font-size: 0.875rem; line-height: 1.4; }

    /* ===== BUTTONS ===== */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      padding: 11px 18px;
      border-radius: 50px;
      border: none;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
      text-decoration: none;
      white-space: nowrap;
    }
    .btn:active { transform: scale(0.96); }
    .btn-primary {
      background: linear-gradient(135deg, var(--coral), var(--orange));
      color: white;
      box-shadow: 0 4px 14px rgba(255,107,107,0.38);
    }
    .btn-primary:hover { box-shadow: 0 6px 18px rgba(255,107,107,0.5); }
    .btn-child {
      background: linear-gradient(135deg, var(--teal), var(--blue));
      color: white;
      box-shadow: 0 4px 14px rgba(78,205,196,0.38);
    }
    .btn-success {
      background: linear-gradient(135deg, #6BCB77, #4CAF50);
      color: white;
      box-shadow: 0 4px 12px rgba(107,203,119,0.35);
    }
    .btn-danger {
      background: linear-gradient(135deg, #FF6B6B, #ee5a24);
      color: white;
      box-shadow: 0 4px 12px rgba(255,107,107,0.3);
    }
    .btn-ghost {
      background: transparent;
      color: var(--text);
      border: 2px solid var(--border);
    }
    .btn-sm { padding: 7px 14px; font-size: 0.82rem; }
    .btn-full { width: 100%; }

    /* ===== BADGES ===== */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 3px 9px;
      border-radius: 50px;
      font-size: 0.73rem;
      font-weight: 600;
      font-family: 'Nunito', sans-serif;
    }
    .badge-chores { background: #FEF3C7; color: #D97706; }
    .badge-homework { background: #EDE9FE; color: #7C3AED; }
    .badge-self-care { background: #D1FAE5; color: #059669; }
    .badge-other { background: #F3F4F6; color: #374151; }
    .badge-daily { background: #DBEAFE; color: #1D4ED8; }
    .badge-weekly { background: #FCE7F3; color: #DB2777; }
    .badge-one-time { background: #F0FDF4; color: #15803D; }
    .badge-pending { background: #FEF9C3; color: #A16207; }
    .badge-done-awaiting { background: #DBEAFE; color: #1D4ED8; }
    .badge-verified { background: #DCFCE7; color: #16A34A; }
    .badge-skipped { background: #F1F5F9; color: #64748B; }
    .badge-high { background: #FEE2E2; color: #DC2626; }
    .badge-medium { background: #FEF3C7; color: #D97706; }
    .badge-low { background: #F0FDF4; color: #16A34A; }
    .badge-approved { background: #DCFCE7; color: #16A34A; }
    .badge-rejected { background: #FEE2E2; color: #DC2626; }

    /* ===== STARS ===== */
    .stars { display: inline-flex; gap: 1px; }
    .star { font-size: 0.95rem; color: #D1D5DB; line-height: 1; }
    .star.filled { color: var(--yellow); }
    .star-lg .star { font-size: 1.3rem; }

    /* ===== FORM ELEMENTS ===== */
    .form-group { margin-bottom: 16px; }
    .form-label {
      display: block;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .form-input, .form-select, .form-textarea {
      width: 100%;
      padding: 11px 14px;
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.93rem;
      color: var(--text);
      background: white;
      transition: border-color 0.2s;
      outline: none;
      -webkit-appearance: none;
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--coral); }
    .form-input.error, .form-select.error, .form-textarea.error { border-color: var(--coral); background: #FFF5F5; }
    .form-error { color: var(--coral); font-size: 0.78rem; margin-top: 4px; display: none; }
    .form-error.show { display: block; }
    .form-textarea { resize: vertical; min-height: 76px; }
    .form-select { cursor: pointer; }

    /* ===== PIN PAD ===== */
    .pin-pad { max-width: 270px; margin: 0 auto; direction: ltr; }
    .pin-display { display: flex; justify-content: center; gap: 14px; margin-bottom: 28px; }
    .pin-dot {
      width: 15px;
      height: 15px;
      border-radius: 50%;
      border: 2.5px solid var(--border);
      background: transparent;
      transition: all 0.18s;
    }
    .pin-dot.filled {
      background: var(--coral);
      border-color: var(--coral);
      transform: scale(1.12);
      box-shadow: 0 2px 8px rgba(255,107,107,0.45);
    }
    .pin-dot.filled.child-theme { background: var(--teal); border-color: var(--teal); box-shadow: 0 2px 8px rgba(78,205,196,0.45); }
    .pin-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .pin-btn {
      aspect-ratio: 1;
      border: none;
      border-radius: var(--radius);
      background: var(--card);
      box-shadow: var(--shadow-sm);
      font-family: 'Nunito', sans-serif;
      font-size: 1.35rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.13s;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text);
    }
    .pin-btn:active { transform: scale(0.92); background: var(--light); }
    .pin-btn.confirm-parent { background: linear-gradient(135deg, var(--coral), var(--orange)); color: white; box-shadow: 0 4px 14px rgba(255,107,107,0.38); }
    .pin-btn.confirm-child { background: linear-gradient(135deg, var(--teal), var(--blue)); color: white; box-shadow: 0 4px 14px rgba(78,205,196,0.38); }
    .pin-btn.delete { font-size: 1rem; }
    .pin-error {
      text-align: center;
      color: var(--coral);
      font-size: 0.88rem;
      font-weight: 600;
      margin-top: 16px;
      min-height: 22px;
      animation: shake 0.38s ease;
    }

    /* ===== TAB NAV ===== */
    .tab-nav {
      display: flex;
      background: var(--light);
      border-radius: 50px;
      padding: 4px;
      margin: 16px 20px;
      gap: 3px;
    }
    .tab-btn {
      flex: 1;
      padding: 7px 2px;
      border: none;
      border-radius: 50px;
      background: transparent;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 0.72rem;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }
    .tab-btn .tab-icon { font-size: 1rem; }
    .tab-btn.active { background: white; color: var(--text); box-shadow: var(--shadow-sm); }

    /* ===== PROGRESS BAR ===== */
    .progress-wrap { background: var(--light); border-radius: 50px; height: 11px; overflow: hidden; }
    .progress-bar { height: 100%; border-radius: 50px; background: linear-gradient(90deg, var(--teal), var(--blue)); transition: width 0.7s ease; }
    .progress-wrap-white { background: rgba(255,255,255,0.28); border-radius: 50px; height: 8px; overflow: hidden; }
    .progress-bar-white { height: 100%; border-radius: 50px; background: white; transition: width 0.8s ease; }

    /* ===== FAB ===== */
    .fab {
      position: fixed;
      bottom: 24px;
      right: max(20px, calc(50vw - 220px));
      width: 54px;
      height: 54px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, var(--coral), var(--orange));
      color: white;
      font-size: 1.6rem;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(255,107,107,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.18s, box-shadow 0.18s;
      z-index: 20;
      line-height: 1;
    }
    .fab:active { transform: scale(0.92); }
    .fab:hover { box-shadow: 0 8px 26px rgba(255,107,107,0.6); }
    .fab-child { background: linear-gradient(135deg, var(--teal), var(--blue)); box-shadow: 0 6px 20px rgba(78,205,196,0.5); }
    .fab-child:hover { box-shadow: 0 8px 26px rgba(78,205,196,0.65); }

    /* ===== MODAL ===== */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.38);
      z-index: 50;
      display: none;
      backdrop-filter: blur(3px);
    }
    .modal-overlay.show { display: block; }
    .modal {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      background: var(--bg);
      border-radius: 24px 24px 0 0;
      padding: 24px 20px 44px;
      z-index: 51;
      display: none;
      max-height: 92vh;
      overflow-y: auto;
    }
    .modal.show { display: block; animation: slideUp 0.28s ease; }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .modal-title { font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 1.25rem; }
    .modal-close {
      width: 32px; height: 32px;
      border-radius: 50%; border: none;
      background: var(--light); font-size: 0.95rem;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .modal-close:hover { background: var(--border); }

    /* ===== TOAST ===== */
    #toast {
      position: fixed;
      bottom: 88px;
      left: 50%;
      transform: translateX(-50%);
      background: #2D3436;
      color: white;
      padding: 11px 22px;
      border-radius: 50px;
      font-family: 'Nunito', sans-serif;
      font-weight: 600;
      font-size: 0.88rem;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.28s;
      white-space: nowrap;
      max-width: 90vw;
    }
    #toast.show { opacity: 1; }

    /* ===== CONFETTI ===== */
    #confetti-container { position: fixed; inset: 0; pointer-events: none; z-index: 200; overflow: hidden; }
    .confetti-piece {
      position: absolute;
      top: -12px;
      border-radius: 2px;
      animation: confettiFall linear forwards;
    }

    /* ===== HOME SCREEN ===== */
    .home-bg {
      min-height: 100vh;
      background: linear-gradient(160deg, #FFF0E8 0%, #FFF9F5 45%, #E8F8F5 100%);
      padding: 36px 24px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .home-logo { font-size: 4.5rem; text-align: center; animation: float 3.2s ease-in-out infinite; margin-bottom: 4px; }
    .home-title {
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 2.1rem;
      text-align: center;
      background: linear-gradient(135deg, var(--coral), var(--orange));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
    }
    .home-motto { text-align: center; color: var(--muted); font-size: 0.93rem; margin-bottom: 36px; font-style: italic; line-height: 1.5; max-width: 280px; }
    .home-section-label {
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 0.8rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 12px;
      text-align: center;
    }
    .child-btn-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      width: 100%;
      margin-bottom: 32px;
    }
    .child-btn {
      background: white;
      border: 2.5px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 14px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: var(--shadow-sm);
    }
    .child-btn:hover { border-color: var(--teal); transform: translateY(-2px); box-shadow: 0 8px 22px rgba(78,205,196,0.2); }
    .child-btn:active { transform: scale(0.97); }
    .child-btn .child-emoji { font-size: 2.6rem; display: block; margin-bottom: 7px; }
    .child-btn .child-name { font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 1rem; color: var(--text); }

    /* ===== SUMMARY CARDS ===== */
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      padding: 0 16px;
      margin-bottom: 4px;
    }
    .summary-card { background: white; border-radius: var(--radius); padding: 12px 8px; text-align: center; box-shadow: var(--shadow-sm); }
    .summary-card .s-icon { font-size: 1.4rem; display: block; margin-bottom: 3px; }
    .summary-card .s-count { font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 1.6rem; line-height: 1; }
    .summary-card .s-label { font-size: 0.68rem; color: var(--muted); font-weight: 500; margin-top: 2px; line-height: 1.25; }

    /* ===== PARENT DASHBOARD HEADER ===== */
    .parent-header {
      background: linear-gradient(135deg, var(--coral), var(--orange));
      padding: 22px 20px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .parent-header h2 { font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 1.3rem; color: white; }
    .logout-btn {
      background: rgba(255,255,255,0.22);
      border: none;
      color: white;
      padding: 6px 14px;
      border-radius: 50px;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      cursor: pointer;
      font-size: 0.83rem;
      transition: background 0.2s;
    }
    .logout-btn:hover { background: rgba(255,255,255,0.32); }

    /* ===== CHILD HOME HEADER ===== */
    .child-header {
      background: linear-gradient(135deg, var(--teal), var(--blue));
      padding: 20px 20px 22px;
      color: white;
    }
    .child-header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .child-header-info { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
    .child-avatar {
      font-size: 2.5rem;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      width: 56px; height: 56px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .child-header h2 { font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 1.45rem; }
    .child-header .motivational { font-size: 0.88rem; opacity: 0.88; margin-top: 3px; }
    .child-points-card {
      background: rgba(255,255,255,0.16);
      border-radius: var(--radius);
      padding: 14px 16px;
      backdrop-filter: blur(8px);
    }
    .child-points-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .points-big { font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 2rem; display: flex; align-items: center; gap: 5px; }
    .points-label { font-size: 0.78rem; opacity: 0.8; margin-bottom: 3px; }
    .milestone-info { text-align: right; }
    .milestone-info .milestone-val { font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 1.05rem; }

    /* ===== TASK CARD ===== */
    .task-card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      padding: 13px 15px;
      margin-bottom: 10px;
      transition: transform 0.18s, box-shadow 0.18s;
      border-left: 3px solid transparent;
    }
    .task-card:hover { transform: translateY(-1px); box-shadow: var(--shadow); }
    .task-card.verified { opacity: 0.55; border-left-color: var(--green); }
    .task-card.done-awaiting { border-left-color: var(--blue); }
    .task-card-header { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 8px; }
    .task-cat-icon { font-size: 1.25rem; flex-shrink: 0; margin-top: 1px; }
    .task-card-info { flex: 1; min-width: 0; }
    .task-card-title { font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 0.93rem; }
    .task-card-sub { font-size: 0.78rem; color: var(--muted); margin-top: 2px; line-height: 1.35; }
    .task-card-meta { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
    .task-card-actions { display: flex; gap: 7px; margin-top: 10px; flex-wrap: wrap; }
    .task-edit-btns { display: flex; gap: 4px; flex-shrink: 0; }
    .icon-btn {
      background: var(--light); border: none; width: 30px; height: 30px;
      border-radius: var(--radius-sm); cursor: pointer; font-size: 0.85rem;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    .icon-btn:hover { background: var(--border); }

    /* ===== REQUEST CARD ===== */
    .request-card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow-sm); padding: 15px; margin-bottom: 11px; }
    .request-card-header { display: flex; align-items: center; gap: 9px; margin-bottom: 7px; }
    .request-icon { font-size: 1.25rem; }
    .request-title { font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 0.93rem; flex: 1; }
    .request-meta { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; margin-bottom: 7px; }
    .request-child-tag { font-size: 0.8rem; color: var(--muted); }
    .request-desc { font-size: 0.85rem; color: var(--muted); margin-bottom: 10px; line-height: 1.4; }
    .request-actions { display: flex; gap: 7px; }
    .reply-area { display: none; margin-top: 10px; }
    .reply-area.show { display: block; }
    .reply-bubble {
      border-radius: 10px;
      padding: 9px 12px;
      font-size: 0.84rem;
      margin-bottom: 4px;
      line-height: 1.4;
    }
    .reply-bubble.approved { background: #F0FDF4; color: #15803D; }
    .reply-bubble.rejected { background: #FEF2F2; color: #DC2626; }

    /* ===== CHILD STAT CARD ===== */
    .child-stat-card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow-sm); padding: 15px; margin-bottom: 11px; }
    .child-stat-header { display: flex; align-items: center; gap: 12px; margin-bottom: 11px; }
    .child-stat-emoji { font-size: 2.1rem; }
    .child-stat-name { font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 1.05rem; flex: 1; }
    .child-stat-pin { font-size: 0.78rem; color: var(--muted); margin-top: 1px; }
    .child-stat-points { font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 1.05rem; color: var(--yellow); display: flex; align-items: center; gap: 3px; }

    /* ===== EMPTY STATE ===== */
    .empty-state { text-align: center; padding: 42px 20px; }
    .empty-state .empty-emoji { font-size: 3.6rem; display: block; margin-bottom: 12px; animation: float 3s ease-in-out infinite; }
    .empty-state h3 { font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 1.08rem; margin-bottom: 5px; }
    .empty-state p { color: var(--muted); font-size: 0.86rem; }

    /* ===== SECTION HELPERS ===== */
    .section-pad { padding: 0 16px; }
    .section-title { font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 0.97rem; margin-bottom: 11px; display: flex; align-items: center; gap: 6px; }
    .spacer80 { height: 80px; }

    /* ===== EMOJI PICKER ===== */
    .emoji-picker { display: flex; gap: 7px; flex-wrap: wrap; }
    .emoji-option {
      font-size: 1.45rem; width: 42px; height: 42px;
      border-radius: var(--radius-sm); border: 2px solid var(--border);
      background: white; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.18s;
    }
    .emoji-option.selected { border-color: var(--teal); background: #E8FBFA; transform: scale(1.1); }

    /* ===== STAR PICKER ===== */
    .star-picker { display: flex; gap: 3px; }
    .star-pick-btn {
      font-size: 1.55rem; background: none; border: none;
      cursor: pointer; color: #D1D5DB; transition: color 0.15s, transform 0.15s;
      padding: 2px; line-height: 1;
    }
    .star-pick-btn.filled { color: var(--yellow); }
    .star-pick-btn:hover { transform: scale(1.2); }

    /* ===== URGENCY / CATEGORY BUTTON GRIDS ===== */
    .choice-grid { display: grid; gap: 8px; }
    .choice-grid-2 { grid-template-columns: repeat(2, 1fr); }
    .choice-grid-3 { grid-template-columns: repeat(3, 1fr); }
    .choice-btn {
      padding: 10px 8px;
      border-radius: var(--radius-sm);
      border: 2px solid var(--border);
      background: white;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 0.84rem;
      cursor: pointer;
      text-align: center;
      transition: all 0.18s;
      color: var(--text);
    }
    .choice-btn:hover { border-color: var(--muted); }
    .choice-btn.sel-low { border-color: #16A34A; background: #F0FDF4; color: #16A34A; }
    .choice-btn.sel-medium { border-color: #D97706; background: #FFFBEB; color: #D97706; }
    .choice-btn.sel-high { border-color: #DC2626; background: #FEF2F2; color: #DC2626; }
    .choice-btn.sel-active { border-color: var(--teal); background: #E8FBFA; color: #0d7a75; }

    /* ===== REWARD CARDS ===== */
    .reward-card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      padding: 13px 14px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 11px;
      transition: transform 0.18s, box-shadow 0.18s;
    }
    .reward-card:hover { transform: translateY(-1px); box-shadow: var(--shadow); }
    .reward-card.inactive { opacity: 0.45; }
    .reward-icon-big { font-size: 1.9rem; flex-shrink: 0; }
    .reward-info { flex: 1; min-width: 0; }
    .reward-title { font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 0.92rem; }
    .reward-desc { font-size: 0.77rem; color: var(--muted); margin-top: 2px; line-height: 1.3; }
    .reward-cost-tag {
      background: linear-gradient(135deg, #FFFBEB, #FEF3C7);
      border: 1.5px solid #FFD166;
      border-radius: 50px;
      padding: 5px 11px;
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 0.88rem;
      color: #B45309;
      display: flex;
      align-items: center;
      gap: 3px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .reward-store-card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      padding: 14px 15px;
      margin-bottom: 10px;
      border: 2px solid var(--border);
      transition: all 0.2s;
    }
    .reward-store-card:hover { box-shadow: var(--shadow); }
    .reward-store-card.can-afford { border-color: rgba(255,209,102,0.5); }
    .reward-store-card.cant-afford { opacity: 0.6; }
    .reward-store-card.already-pending { border-color: var(--blue); background: #F0F9FF; }
    .reward-store-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .reward-store-icon { font-size: 1.8rem; flex-shrink: 0; }
    .reward-store-title { font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 0.92rem; flex: 1; }
    .reward-store-footer { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .redemption-card {
      background: linear-gradient(135deg, #FFFBEB, #FFF9F5);
      border: 1.5px solid #FFD166;
      border-radius: var(--radius);
      padding: 13px 14px;
      margin-bottom: 10px;
    }
    .redemption-header { display: flex; align-items: center; gap: 9px; margin-bottom: 7px; }
    .pending-redemptions-banner {
      background: linear-gradient(135deg, #FEF3C7, #FFFBEB);
      border-radius: 12px;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 0 0 12px;
      border: 1px solid #FFD166;
      cursor: pointer;
    }
    /* scrollable tab nav for 6 tabs */
    .tab-nav { overflow-x: auto; flex-wrap: nowrap; scrollbar-width: none; }
    .tab-nav::-webkit-scrollbar { display: none; }
    .tab-btn { min-width: 56px; }

    /* ===== TIME-OF-DAY SLOT HEADERS ===== */
    .time-slot-header {
      display: flex; align-items: center; gap: 6px;
      font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 0.82rem;
      color: var(--muted); margin: 16px 0 7px; padding: 0 2px;
      text-transform: uppercase; letter-spacing: 0.07em;

    .badge-noon    { background: #FEFCE8; color: #CA8A04; }
    .badge-evening { background: #EEF2FF; color: #4338CA; }
    .badge-anytime { background: #F0FDF4; color: #15803D; }

    /* ===== STREAK ===== */
    .streak-badge {
      display: inline-flex; align-items: center; gap: 4px;
      background: linear-gradient(135deg, #FEF3C7, #FFFBEB);
      border: 1.5px solid #FFD166; border-radius: 50px;
      padding: 5px 13px;
      font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 0.88rem;
      color: #B45309;
    }

    /* ===== HISTORY ENTRIES ===== */
    .history-entry {
      background: var(--card); border-radius: var(--radius-sm);
      box-shadow: var(--shadow-sm); padding: 11px 13px; margin-bottom: 9px;

    .history-entry-time { font-size: 0.72rem; color: var(--muted); margin-top: 4px; }

    /* ===== DIVIDER ===== */
    .divider { height: 1px; background: var(--border); margin: 14px 0; }

    /* ===== ANIMATIONS ===== */
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideUp {
      from { transform: translate(-50%, 60px); opacity: 0; }
      to { transform: translate(-50%, 0); opacity: 1; }
    }
    @keyframes starBurst {
      0% { transform: scale(1); }
      35% { transform: scale(1.45); filter: drop-shadow(0 0 10px var(--yellow)); }
      100% { transform: scale(1); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.18); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-9px); }
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-7px); }
      40%, 80% { transform: translateX(7px); }
    }
    @keyframes confettiFall {
      0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }
    @keyframes pointPop {
      0% { transform: scale(1); }
      50% { transform: scale(1.25); color: var(--yellow); }
      100% { transform: scale(1); }
    }

    /* ===== LANGUAGE TOGGLE ===== */
    .lang-toggle {
      position: absolute; top: 16px; left: 16px;
      display: flex; gap: 4px; background: rgba(255,255,255,0.25);
      border-radius: 50px; padding: 3px;
    }
    .lang-btn {
      padding: 4px 11px; border-radius: 50px; border: none;

    #app[dir="rtl"] .child-header-top { flex-direction: row-reverse; }
    #app[dir="rtl"] .child-header-info { flex-direction: row-reverse; }
    #app[dir="rtl"] .child-points-row { flex-direction: row-reverse; }
    #app[dir="rtl"] .milestone-info { text-align: left; }
    #app[dir="rtl"] .summary-grid { direction: rtl; }
    #app[dir="rtl"] .tab-nav { direction: rtl; }
    #app[dir="rtl"] .form-label { text-align: right; display: block; }
    #app[dir="rtl"] .form-input, #app[dir="rtl"] .form-select, #app[dir="rtl"] .form-textarea { text-align: right; direction: rtl; }
    #app[dir="rtl"] .modal-header { flex-direction: row-reverse; }
    #app[dir="rtl"] .redemption-header { flex-direction: row-reverse; }
    #app[dir="rtl"] .history-entry-top { flex-direction: row-reverse; }
    #app[dir="rtl"] .parent-header { flex-direction: row-reverse; }

    #app[dir="rtl"] .choice-grid { direction: rtl; }
    #app[dir="rtl"] .fab { right: auto; left: max(20px, calc(50vw - 220px)); }
    @media (min-width: 481px) { #app[dir="rtl"] .fab { left: calc(50vw - 216px); right: auto; } }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
      .summary-card .s-count { font-size: 1.35rem; }

    @media (min-width: 481px) {
      #app { border-left: 1px solid var(--border); border-right: 1px solid var(--border); }
      .fab { right: calc(50vw - 216px); }
    }
  </style>
</head>

function genId() {
  return Date.now().toString(36) + Math.random().toString(36).substr(2, 6);
}

function today() {
  return new Date().toISOString().split('T')[0];
}

function getWeekStart() {
  const d = new Date();
  const day = d.getDay();
  const diff = d.getDate() - day + (day === 0 ? -6 : 1);
  const m = new Date(d.getFullYear(), d.getMonth(), diff);
  return m.toISOString().split('T')[0];
}

function esc(str) {
  if (str == null) return '';
  const d = document.createElement('div');
  d.textContent = String(str);
  return d.innerHTML;
}

function starsHTML(n, cls) {
  let html = `<span class="stars${cls ? ' ' + cls : ''}">`;
  for (let i = 1; i <= 5; i++) html += `<span class="star${i <= n ? ' filled' : ''}">★</span>`;
  return html + '</span>';
}

function formatDate(ts) {
  return new Date(ts).toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);

}

function logHistory(type, icon, description, childId) {
  if (!State.data.approvalHistory) State.data.approvalHistory = [];
  State.data.approvalHistory.unshift({
    id: genId(), type, icon, description, childId,
    ts: Date.now()
  });
  if (State.data.approvalHistory.length > 300) State.data.approvalHistory.length = 300;
}

/* =====================================================================
   STREAK CHECKING
===================================================================== */
function checkStreakForChild(childId) {
  const cfg = State.data.streakConfig;
  if (!cfg || !cfg.enabled) return;
  const child = State.getChild(childId);
  if (!child) return;
  const tasks = State.getChildTasks(childId);
  const allDone = tasks.length > 0 && tasks.every(({ comp }) => comp && (comp.status === 'verified'));
  if (!allDone) return;
  const todayStr = today();
  if (child.lastFullDay === todayStr) return;
  const yesterday = new Date(Date.now() - 86400000).toISOString().split('T')[0];
  if (child.lastFullDay === yesterday) {
    child.currentStreak = (child.currentStreak || 0) + 1;
  } else {
    child.currentStreak = 1;
  }
  child.lastFullDay = todayStr;
  if (child.currentStreak >= cfg.requiredDays) {
    child.totalPoints += cfg.bonusStars;
    child.currentStreak = 0;
    logHistory('streak', '🔥', `${child.name} completed a ${cfg.requiredDays}-day streak! +${cfg.bonusStars} bonus ⭐`, childId);
    State.save();
    showToast(_lang==='he'?`🔥 ${child.name} השיג רצף של ${cfg.requiredDays} ימים! +${cfg.bonusStars} כוכבי בונוס!`:`🔥 ${child.name} hit a ${cfg.requiredDays}-day streak! +${cfg.bonusStars} bonus stars!`);
  } else {
    State.save();
  }
}

===================================================================== */
let _notifCheckerInterval = null;
let _firedToday = {};

function requestNotifPermission(callback) {
  if (!('Notification' in window)) {
    showToast(_lang==='he'?'❌ דפדפן זה אינו תומך בהתראות':'❌ This browser does not support notifications');
    return;
  }
  Notification.requestPermission().then(perm => {
    State.data.notificationSettings.permission = perm;
    State.save();
    if (callback) callback(perm);
    if (perm === 'granted') showToast(_lang==='he'?'🔔 התראות הופעלו!':'🔔 Notifications enabled!');
    else if (perm === 'denied') showToast(_lang==='he'?'❌ התראות חסומות בהגדרות הדפדפן':'❌ Notifications blocked in browser settings');
    else showToast(_lang==='he'?'הרשאת התראות בוטלה':'Notification permission dismissed');
    switchTab('settings');
  });
}

function startNotificationChecker() {
  if (_notifCheckerInterval) clearInterval(_notifCheckerInterval);
  _notifCheckerInterval = setInterval(() => {
    const ns = State.data.notificationSettings;
    if (!ns || !ns.enabled || Notification.permission !== 'granted') return;
    const now = new Date();
    const hh = now.getHours(), mm = now.getMinutes();
    const todayKey = today();
    (ns.reminders || []).forEach(rem => {
      if (!rem.active) return;
      const key = rem.id + '_' + todayKey;
      if (_firedToday[key]) return;
      if (rem.hour === hh && rem.minute === mm) {
        _firedToday[key] = true;
        new Notification('Family Hub 🏠', {
          body: rem.label || 'Time to check the task list!',
          icon: ''
        });
      }
    });
  }, 30000);
}

const State = {
  data: null,
  currentUser: null,

  _localWrite: false,
  _listening:  false,

  async load() {
    try {
      const snapshot = await _dbRef.get();
      if (snapshot.exists()) {
        this.data = snapshot.val();
        this._migrate();
      } else {
        this.seed();
      }
    } catch(e) {
      console.warn('Firebase load failed, using localStorage fallback:', e);
      const raw = localStorage.getItem('familyApp');
      if (raw) { try { this.data = JSON.parse(raw); this._migrate(); } catch(e2) { this.seed(); } }
      else { this.seed(); }
    }
    this._startListening();
  },

  _migrate() {
    if (!this.data.taskCompletions)       this.data.taskCompletions = [];
    if (!this.data.requests)              this.data.requests = [];
    if (!this.data.children)              this.data.children = [];
    if (!this.data.tasks)                 this.data.tasks = [];
    if (!this.data.rewards)               this.data.rewards = [];
    if (!this.data.redemptions)           this.data.redemptions = [];
    if (!this.data.approvalHistory)       this.data.approvalHistory = [];
    if (!this.data.notificationSettings)  this.data.notificationSettings = { enabled: false, reminders: [] };
    if (!this.data.streakConfig)          this.data.streakConfig = { enabled: false, requiredDays: 7, bonusStars: 5 };
    this.data.children.forEach(c => {
      if (c.currentStreak === undefined) c.currentStreak = 0;
      if (!c.lastFullDay) c.lastFullDay = '';
    });
    this.data.tasks.forEach(t => { if (!t.timeOfDay) t.timeOfDay = 'anytime'; });
  },

  _startListening() {
    if (this._listening) return;
    this._listening = true;
    _dbRef.on('value', snapshot => {
      if (!snapshot.exists() || this._localWrite) return;
      this.data = snapshot.val();
      this._migrate();
      const modalOpen = document.getElementById('modal').classList.contains('show');
      const view = Router.currentView;
      if (!modalOpen && view && view !== 'pin' && view !== 'home') {
        Views[view].render(Router.params || {});
      }
    });
  },

  save() {
    this._localWrite = true;
    _dbRef.set(this.data).catch(e => console.warn('Firebase save failed:', e));
    setTimeout(() => { this._localWrite = false; }, 1500);
    try { localStorage.setItem('familyApp', JSON.stringify(this.data)); } catch(e) {}

  getChild(id)  { return this.data.children.find(c => c.id === id); },
  getTask(id)   { return this.data.tasks.find(t => t.id === id); },
  getReward(id) { return (this.data.rewards||[]).find(r => r.id === id); },

  getGroupRedemption(rewardId) {
    return (this.data.redemptions||[]).find(r => r.rewardId === rewardId && r.isGroup && r.status === 'collecting');
  },
  getGroupProgress(rewardId) {
    const rd = this.getGroupRedemption(rewardId);
    if (!rd) return { total: 0, contributions: [], rdId: null };
    const total = (rd.contributions||[]).reduce((s, c) => s + c.amount, 0);
    return { total, contributions: rd.contributions||[], rdId: rd.id };
  },

  ensureCompletion(taskId, childId) {
    const task = this.getTask(taskId);
    if (!task) return null;
    const periodKey = task.recurrence === 'weekly' ? getWeekStart() : today();
    let comp = this.data.taskCompletions.find(
      c => c.taskId === taskId && c.childId === childId && c.date === periodKey
    );
    if (!comp) {
      comp = { id: genId(), taskId, childId, status: 'pending', date: periodKey };
      this.data.taskCompletions.push(comp);
      this.save();
    }
    return comp;
  },

  getChildTasks(childId) {
    return this.data.tasks
      .filter(t => t.assignedTo === 'all' || t.assignedTo === childId)
      .map(task => ({ task, comp: this.ensureCompletion(task.id, childId) }));
  },

  getSummary() {
    const todayStr = today(), weekStr = getWeekStart();
    let pendingCount = 0;
    this.data.tasks.forEach(task => {
      const targets = task.assignedTo === 'all'
        ? this.data.children
        : this.data.children.filter(c => c.id === task.assignedTo);
      const periodKey = task.recurrence === 'weekly' ? weekStr : todayStr;
      targets.forEach(child => {
        const comp = this.data.taskCompletions.find(
          c => c.taskId === task.id && c.childId === child.id && c.date === periodKey
        );
        if (!comp || comp.status === 'pending') pendingCount++;
      });
    });
    const awaitingVerification = this.data.taskCompletions.filter(c => c.status === 'done-awaiting').length;
    const pendingRequests    = this.data.requests.filter(r => r.status === 'pending').length;
    const individualPending  = (this.data.redemptions||[]).filter(r => !r.isGroup && r.status === 'pending').length;
    const groupAtGoal        = (this.data.redemptions||[]).filter(r => {
      if (!r.isGroup || r.status !== 'collecting') return false;
      const rw = this.getReward(r.rewardId);
      const total = (r.contributions||[]).reduce((s,c)=>s+c.amount,0);
      return rw && total >= rw.cost;
    }).length;
    const pendingRedemptions = individualPending + groupAtGoal;
    return { pendingCount, awaitingVerification, pendingRequests, pendingRedemptions };
  }
};

    if (this.currentView) {
      const cur = document.getElementById('view-' + this.currentView);
      if (cur) cur.classList.remove('active');
      if (addToStack && this.currentView !== viewId) this.stack.push(this.currentView);
    }
    this.currentView = viewId;
    this.params = params;
    if (Views[viewId]) Views[viewId].render(params);
    const next = document.getElementById('view-' + viewId);
    if (next) { next.classList.add('active'); next.scrollTop = 0; }
  },

  back() {
    if (this.stack.length > 0) {
      const prev = this.stack.pop();
      const cur = document.getElementById('view-' + this.currentView);
      if (cur) cur.classList.remove('active');
      this.currentView = prev;
      this.params = {};
      const next = document.getElementById('view-' + prev);
      if (next) { next.classList.add('active'); next.scrollTop = 0; }
    }
  }
};

===================================================================== */
function openModal(content, title) {
  document.getElementById('modal').innerHTML = `
    <div class="modal-header">
      <span class="modal-title">${title}</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    ${content}
  `;
  document.getElementById('modal').classList.add('show');
  document.getElementById('modal-overlay').classList.add('show');
}
function closeModal() {
  document.getElementById('modal').classList.remove('show');
  document.getElementById('modal-overlay').classList.remove('show');
}

/* =====================================================================
   PIN PAD
===================================================================== */
const PinPad = {
  value: '',
  params: null,

  init(params) {
    this.value = '';
    this.params = params;
    this.updateDots();
  },

  press(digit) {
    if (this.value.length >= 4) return;
    this.value += digit;
    this.updateDots();
    if (this.value.length === 4) setTimeout(() => this.check(), 180);
  },

  del() {
    if (this.value.length > 0) {
      this.value = this.value.slice(0, -1);
      this.updateDots();
      const e = document.getElementById('pin-error');
      if (e) e.textContent = '';
    }
  },

  updateDots() {
    for (let i = 0; i < 4; i++) {
      const dot = document.getElementById('pdot' + i);
      if (dot) dot.classList.toggle('filled', i < this.value.length);
    }
  },

  check() {
    const isParent = this.params.role === 'parent';
    let ok = false;
    if (isParent) {
      ok = this.value === State.data.parentPin;
    } else {
      const child = State.getChild(this.params.childId);
      ok = child && this.value === child.pin;
    }
    if (ok) {
      if (isParent) {
        State.currentUser = { type: 'parent' };
        Router.navigate('parent-dashboard', { tab: 'tasks' });
      } else {
        State.currentUser = { type: 'child', id: this.params.childId };
        Router.navigate('child-home', { childId: this.params.childId });
      }
    } else {
      const e = document.getElementById('pin-error');
      if (e) {
        e.style.animation = 'none';
        e.textContent = t('wrongPin');
        void e.offsetHeight;
        e.style.animation = '';
      }
      this.value = '';
      this.updateDots();
    }
  }
};

          <div class="form-group" style="margin-bottom:10px;">

        <div class="card" style="border:1.5px solid #FFD166;">

          <div class="card-desc" style="margin-bottom:12px;">${t('streakDesc')}</div>
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
            <span style="font-family:'Nunito',sans-serif;font-weight:700;font-size:0.88rem;">${t('enableStreak')}</span>

          <button class="btn btn-primary btn-sm" style="margin-bottom:12px;" onclick="requestNotifPermission()">${t('allowNotif')}</button>` : ''}
          ${notifPerm === 'granted' ? `

            <span style="font-family:'Nunito',sans-serif;font-weight:700;font-size:0.88rem;">${t('remindersActive')}</span>
            <label style="display:flex;align-items:center;gap:6px;cursor:pointer;">

          <button class="btn btn-ghost btn-sm" style="margin-top:6px;" onclick="doAddReminder()">${t('addReminder')}</button>` : ''}

        <div class="card" style="background:linear-gradient(135deg,#FFF5F5,#FFF9F5);border:1px solid #FEE2E2;">

          <button class="btn btn-danger btn-sm" onclick="doResetApp()">${t('resetBtn')}</button>

    _history() {
      const hist = State.data.approvalHistory || [];
      const children = State.data.children;

      const filterBtns = `
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;">
          <button class="btn btn-ghost btn-sm" id="hf-all"     onclick="filterHistory('all')"     style="font-size:0.78rem;">${t('filterAll')}</button>
          <button class="btn btn-ghost btn-sm" id="hf-task"    onclick="filterHistory('task')"    style="font-size:0.78rem;">${t('filterTasks')}</button>
          <button class="btn btn-ghost btn-sm" id="hf-request" onclick="filterHistory('request')" style="font-size:0.78rem;">${t('filterRequests')}</button>
          <button class="btn btn-ghost btn-sm" id="hf-reward"  onclick="filterHistory('reward')"  style="font-size:0.78rem;">${t('filterRewards')}</button>
          <button class="btn btn-ghost btn-sm" id="hf-streak"  onclick="filterHistory('streak')"  style="font-size:0.78rem;">${t('filterStreaks')}</button>
        </div>`;

      if (!hist.length) return `
        <div class="section-pad">
          ${filterBtns}
          <div class="empty-state">
            <span class="empty-emoji">📜</span>
            <h3>${t('noHistoryYet')}</h3>
            <p>${t('historyDesc')}</p>
          </div>
        </div>`;

      const entries = hist.map(h => {
        const child = h.childId ? State.getChild(h.childId) : null;
        const childTag = child ? `<span style="font-size:0.8rem;color:var(--muted);">${child.emoji} ${esc(child.name)}</span>` : '';
        const dt = new Date(h.ts);
        const dateStr = dt.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: '2-digit' });
        const timeStr = dt.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
        return `<div class="history-entry type-${h.type}" data-htype="${h.type}">
          <div class="history-entry-top">
            <span class="history-entry-icon">${h.icon}</span>
            <div style="flex:1">
              <div class="history-entry-desc">${esc(h.description)}</div>
              <div class="history-entry-time">${childTag}${child ? ' &nbsp;·&nbsp; ' : ''}${dateStr} at ${timeStr}</div>
            </div>
          </div>
        </div>`;
      }).join('');

      return `<div class="section-pad">
        ${filterBtns}
        <div id="history-list">${entries}</div>
        ${hist.length >= 50 ? `<div style="text-align:center;font-size:0.78rem;color:var(--muted);padding:8px 0;">Showing last ${hist.length} events (max 300)</div>` : ''}
        <div class="spacer80"></div>
      </div>`;
    }
  },

  /* ---- CHILD HOME ---- */
  'child-home': {
    render(params) {
      const child = State.getChild(params.childId);
      if (!child) { Router.navigate('home'); return; }

      const tasks = State.getChildTasks(child.id);
      const motivational = getMotivational(child.name);
      const MILESTONE = 50;
      const progress = Math.min(((child.totalPoints % MILESTONE) / MILESTONE) * 100, 100);
      const nextMilestone = (Math.floor(child.totalPoints / MILESTONE) + 1) * MILESTONE;
      const pendingReqCount = State.data.requests.filter(r => r.childId === child.id && r.status === 'pending').length;
      const allVerified = tasks.length > 0 && tasks.every(({ comp }) => comp.status === 'verified');

      function renderTaskCard(task, comp) {
        const isAwaiting = comp.status === 'done-awaiting';
        const isVerified = comp.status === 'verified';
        return `<div class="task-card ${isVerified ? 'verified' : ''} ${isAwaiting ? 'done-awaiting' : ''}">
          <div class="task-card-header">
            <span class="task-cat-icon">${CAT_EMOJI[task.category]||'✨'}</span>
            <div class="task-card-info">
              <div class="task-card-title" style="${isVerified ? 'text-decoration:line-through;color:var(--muted)' : ''}">${esc(task.title)}</div>
              ${task.description ? `<div class="task-card-sub">${esc(task.description)}</div>` : ''}
              ${task.dueTime ? `<div class="task-card-sub">⏰ ${esc(task.dueTime)}</div>` : ''}
            </div>
            ${starsHTML(task.points)}
          </div>
          <div class="task-card-meta">
            <span class="badge badge-${task.category}">${task.category}</span>
            ${isVerified ? `<span class="badge badge-verified">${t('verifiedBadge')}</span>` : ''}
            ${isAwaiting ? `<span class="badge badge-done-awaiting">${t('awaitingApproval')}</span>` : ''}
          </div>
          ${comp.status === 'pending' ? `
            <div class="task-card-actions">
              <button class="btn btn-child btn-sm" onclick="doMarkTaskDone('${comp.id}','${child.id}')">${t('markDone')}</button>
            </div>` : ''}
        </div>`;
      }

      const slotOrder = ['morning','noon','evening','anytime'];
      const grouped = {};
      slotOrder.forEach(s => grouped[s] = []);
      tasks.forEach(entry => {
        const slot = entry.task.timeOfDay || 'anytime';
        if (!grouped[slot]) grouped[slot] = [];
        grouped[slot].push(entry);
      });

      let taskCards = '';
      slotOrder.forEach(slot => {
        if (!grouped[slot].length) return;
        taskCards += `<div class="time-slot-header">${t('tod'+slot.charAt(0).toUpperCase()+slot.slice(1))}</div>`;
        taskCards += grouped[slot].map(({ task, comp }) => renderTaskCard(task, comp)).join('');
      });

      const sc = State.data.streakConfig;
      const streakBadge = sc && sc.enabled && (child.currentStreak || 0) > 0
        ? `<div class="streak-badge">🔥 ${child.currentStreak}-day streak! ${child.currentStreak >= sc.requiredDays - 1 ? '🏆 Almost there!' : `${sc.requiredDays - child.currentStreak} more for +${sc.bonusStars}⭐`}</div>`
        : '';

      document.getElementById('view-child-home').innerHTML = `
        <div class="child-header">
          <div class="child-header-top">
            <button onclick="doLogout()" class="logout-btn" style="background:rgba(255,255,255,0.2);border:none;color:white;">${t('back')}</button>
            <div style="display:flex;gap:6px;">
              <button onclick="Router.navigate('child-rewards',{childId:'${child.id}'})"
                class="logout-btn" style="background:rgba(255,255,255,0.2);border:none;color:white;">
                ${t('storeBtn')}
              </button>
              <button onclick="Router.navigate('child-request-history',{childId:'${child.id}'})"
                class="logout-btn" style="background:rgba(255,255,255,0.2);border:none;color:white;">
                📬${pendingReqCount ? ' 🔴' : ''}
              </button>
            </div>
          </div>
          <div class="child-header-info">
            <div class="child-avatar">${child.emoji}</div>
            <div>
              <h2>${esc(child.name)}</h2>
              <div class="motivational">${motivational}</div>
            </div>
          </div>
          <div class="child-points-card">
            <div class="child-points-row">
              <div>
                <div class="points-label">${t('totalStars')}</div>
                <div class="points-big" id="pts-${child.id}">⭐ <span id="pts-num-${child.id}">${child.totalPoints}</span></div>
              </div>
              <div class="milestone-info">
                <div class="points-label">${t('nextMilestone')}</div>
                <div class="milestone-val">${nextMilestone} ⭐</div>
              </div>
            </div>
            <div class="progress-wrap-white">
              <div class="progress-bar-white" style="width:${progress}%"></div>
            </div>
          </div>
          ${streakBadge ? `<div style="margin-top:10px;">${streakBadge}</div>` : ''}
        </div>

        <div style="padding:12px 16px 90px;">
          ${allVerified ? `
            <div class="empty-state">
              <span class="empty-emoji">🎉</span>
              <h3>${t('allDoneTitle')}</h3>
              <p>${t('allDoneDesc')}</p>
            </div>` : tasks.length === 0 ? `
            <div class="empty-state">
              <span class="empty-emoji">😊</span>
              <h3>${t('noTasksTitle')}</h3>
              <p>${t('noTasksDesc')}</p>
            </div>` : taskCards}
        </div>

        <button class="fab fab-child" onclick="Router.navigate('child-request-form',{childId:'${child.id}'})" title="Make a request">✉️</button>`;
    }
  },

  /* ---- CHILD REQUEST FORM ---- */

            <input type="hidden" id="rq-urgency" value="">
            <span class="form-error" id="rq-urg-err">${_lang==='he'?'נא לבחור דחיפות':'Please select urgency'}</span>

          </button>

  /* ---- CHILD REWARDS STORE ---- */
  'child-rewards': {
    render(params) {
      const child = State.getChild(params.childId);
      if (!child) { Router.navigate('home'); return; }

      const rewards = (State.data.rewards || []).filter(r => r.isActive);
      const myRedemptions = (State.data.redemptions || [])
        .filter(r => r.childId === child.id)
        .sort((a, b) => b.createdAt - a.createdAt);

      const rewardCards = rewards.length ? rewards.map(rw => {
        // ---- GROUP REWARD ----
        if (rw.isGroup) {
          const prog      = State.getGroupProgress(rw.id);
          const pct       = Math.min(100, Math.round((prog.total / rw.cost) * 100));
          const goalMet   = prog.total >= rw.cost;
          const myContrib = prog.contributions.find(c => c.childId === child.id);
          const contribLines = State.data.children.map(ch => {
            const c = prog.contributions.find(x => x.childId === ch.id);
            return `<span style="display:inline-flex;align-items:center;gap:3px;">${ch.emoji} ${esc(ch.name)}: <b>${c ? c.amount : 0} ⭐</b></span>`;
          }).join(' &nbsp;·&nbsp; ');
          return `<div class="reward-store-card" style="border-color:${goalMet?'var(--yellow)':'rgba(78,205,196,0.35)'};${goalMet?'background:linear-gradient(135deg,#FFFBEB,#FFF9F5);':''}">
            <div class="reward-store-header">
              <span class="reward-store-icon">${rw.icon}</span>
              <div style="flex:1">
                <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap;">
                  <div class="reward-store-title">${esc(rw.title)}</div>
                  <span style="background:linear-gradient(135deg,var(--teal),var(--blue));color:white;border-radius:50px;padding:2px 8px;font-size:0.65rem;font-family:'Nunito',sans-serif;font-weight:700;">👨‍👩‍👧‍👦 Family</span>
                </div>
                ${rw.description ? `<div class="reward-desc">${esc(rw.description)}</div>` : ''}
              </div>
            </div>
            <div style="margin:8px 0 4px;">
              <div style="display:flex;justify-content:space-between;font-size:0.77rem;margin-bottom:5px;">
                <span style="color:var(--muted);">${contribLines}</span>
                <span style="font-family:'Nunito',sans-serif;font-weight:700;color:${goalMet?'#D97706':'var(--text)'};">${prog.total} / ${rw.cost} ⭐</span>
              </div>
              <div class="progress-wrap" style="height:9px;">
                <div class="progress-bar" style="width:${pct}%;${goalMet?'background:linear-gradient(90deg,var(--yellow),var(--orange));':''}"></div>
              </div>
            </div>
            <div class="reward-store-footer" style="margin-top:8px;">
              <div class="reward-cost-tag">${_lang==='he'?'יעד':'Goal'}: ${rw.cost} ⭐</div>
              ${goalMet
                ? `<span class="badge badge-done-awaiting">${t('goalReachedBadge')}</span>`
                : `<button class="btn btn-child btn-sm" onclick="openContributeModal('${rw.id}','${child.id}')">
                    ${myContrib ? `✏️ (${myContrib.amount} ⭐)` : t('contributeBtn')}
                  </button>`
              }
            </div>
          </div>`;
        }
        // ---- INDIVIDUAL REWARD ----
        const canAfford = child.totalPoints >= rw.cost;
        const pending = myRedemptions.find(r => r.rewardId === rw.id && !r.isGroup && r.status === 'pending');
        let cls = 'reward-store-card';
        if (pending) cls += ' already-pending';
        else if (canAfford) cls += ' can-afford';
        else cls += ' cant-afford';
        return `<div class="${cls}">
          <div class="reward-store-header">
            <span class="reward-store-icon">${rw.icon}</span>
            <div style="flex:1">
              <div class="reward-store-title">${esc(rw.title)}</div>
              ${rw.description ? `<div class="reward-desc">${esc(rw.description)}</div>` : ''}
            </div>
          </div>
          <div class="reward-store-footer">
            <div class="reward-cost-tag">⭐ ${rw.cost} stars</div>
            ${pending
              ? `<span class="badge badge-done-awaiting">${t('pendingApproval')}</span>`
              : canAfford
                ? `<button class="btn btn-child btn-sm" onclick="doRedeemReward('${rw.id}','${child.id}')">${t('redeemBtn')}</button>`
                : `<span style="font-size:0.78rem;color:var(--muted);">${t('needMoreStars').replace('{n}', rw.cost - child.totalPoints)}</span>`
            }
          </div>
        </div>`;
      }).join('') : `
        <div class="empty-state">
          <span class="empty-emoji">🎁</span>
          <h3>No rewards available</h3>
          <p>Ask your parents to add rewards to the store</p>
        </div>`;

      const historyCards = myRedemptions.length ? myRedemptions.slice(0, 10).map(rd => {
        const rw = (State.data.rewards || []).find(r => r.id === rd.rewardId);

/* --- TASKS --- */
function doMarkTaskDone(compId, childId) {
  const comp = State.data.taskCompletions.find(c => c.id === compId);
  if (!comp) return;
  comp.status = 'done-awaiting';
  State.save();
  spawnConfetti();
  showToast(_lang==='he'?'✅ המשימה סומנה כבוצעת! ממתינה לאישור הורה…':'✅ Task marked done! Waiting for parent approval…');
  setTimeout(() => Router.navigate('child-home', { childId }, false), 400);
}

function doVerifyTask(compId) {
  const comp = State.data.taskCompletions.find(c => c.id === compId);
  if (!comp) return;
  const task = State.getTask(comp.taskId);
  const child = State.getChild(comp.childId);
  if (!task || !child) return;
  comp.status = 'verified';
  child.totalPoints += task.points;
  logHistory('task', '✅', `Verified "${task.title}" for ${child.name} (+${task.points} ⭐)`, child.id);
  State.save();
  checkStreakForChild(child.id);
  showToast(_lang==='he'?`⭐ ${child.name} הרוויח ${task.points} כוכב${task.points > 1 ? 'ים' : ''}!`:`⭐ ${child.name} earned ${task.points} star${task.points > 1 ? 's' : ''}!`);
  switchTab(Views['parent-dashboard']._tab);
}

function doSkipTask(compId) {
  const comp = State.data.taskCompletions.find(c => c.id === compId);
  if (!comp) return;
  comp.status = 'skipped';
  State.save();
  showToast(_lang==='he'?'משימה דולגה':'Task skipped');
  switchTab(Views['parent-dashboard']._tab);
}

function doSaveTask(editId) {
  const title = document.getElementById('tm-title').value.trim();
  if (!title) {
    document.getElementById('tm-title').classList.add('error');
    document.getElementById('tm-title-err').classList.add('show');
    return;
  }
  const task = {
    id: editId || genId(),
    title,
    description: document.getElementById('tm-desc').value.trim(),
    category:    document.getElementById('tm-cat').value,
    assignedTo:  document.getElementById('tm-assign').value,
    recurrence:  document.getElementById('tm-rec').value,
    points:      parseInt(document.getElementById('tm-points').value) || 2,
    timeOfDay:   document.getElementById('tm-tod').value || 'anytime',
    dueTime:     document.getElementById('tm-due').value.trim()
  };
  if (editId) {
    const idx = State.data.tasks.findIndex(t => t.id === editId);
    if (idx !== -1) State.data.tasks[idx] = task;
  } else {
    State.data.tasks.push(task);
  }
  State.save();
  closeModal();
  showToast(editId ? (_lang==='he'?'✏️ משימה עודכנה!':'✏️ Task updated!') : (_lang==='he'?'✅ משימה נוספה!':'✅ Task added!'));
  switchTab('tasks');
}

function doDeleteTask(taskId) {
  if (!confirm(_lang==='he'?'למחוק את המשימה? לא ניתן לבטל פעולה זו.':'Delete this task? This cannot be undone.')) return;
  State.data.tasks = State.data.tasks.filter(t => t.id !== taskId);
  State.data.taskCompletions = State.data.taskCompletions.filter(c => c.taskId !== taskId);
  State.save();
  showToast(_lang==='he'?'🗑️ המשימה נמחקה':'🗑️ Task deleted');
  switchTab('tasks');
}

function doSaveChild(editId) {
  const name = document.getElementById('cm-name').value.trim();
  const pin  = document.getElementById('cm-pin').value.trim();
  const emoji = document.getElementById('cm-emoji').value;
  let valid = true;
  if (!name) {
    document.getElementById('cm-name').classList.add('error');
    document.getElementById('cm-name-err').classList.add('show');
    valid = false;
  } else {
    document.getElementById('cm-name').classList.remove('error');
    document.getElementById('cm-name-err').classList.remove('show');
  }
  if (!/^\d{4}$/.test(pin)) {
    document.getElementById('cm-pin').classList.add('error');
    document.getElementById('cm-pin-err').classList.add('show');
    valid = false;
  } else {
    document.getElementById('cm-pin').classList.remove('error');
    document.getElementById('cm-pin-err').classList.remove('show');
  }
  if (!valid) return;
  if (editId) {
    const child = State.getChild(editId);
    if (child) { child.name = name; child.pin = pin; child.emoji = emoji; }
  } else {
    State.data.children.push({ id: genId(), name, pin, emoji, totalPoints: 0 });
  }
  State.save();
  closeModal();
  showToast(editId ? (_lang==='he'?'✏️ הילד עודכן!':'✏️ Child updated!') : (_lang==='he'?'👧 ילד נוסף!':'👧 Child added!'));
  switchTab('children');
}

function doRemoveChild(childId) {
  const child = State.getChild(childId);
  if (!child) return;
  if (!confirm(_lang==='he' ? `להסיר את ${child.name}? כל ההיסטוריה והבקשות שלהם יוסרו גם כן.` : `Remove ${child.name}? All their task history and requests will also be removed.`)) return;
  State.data.children          = State.data.children.filter(c => c.id !== childId);
  State.data.taskCompletions   = State.data.taskCompletions.filter(c => c.childId !== childId);
  State.data.requests          = State.data.requests.filter(r => r.childId !== childId);
  State.save();
  showToast(`${child.emoji} ${child.name} removed`);
  switchTab('children');
}

function doSaveReminder(remId) {
  const rem = (State.data.notificationSettings.reminders || []).find(r => r.id === remId);
  if (!rem) return;
  const lbl = document.getElementById('rem-lbl-' + remId);
  const hr  = document.getElementById('rem-hr-'  + remId);
  const min = document.getElementById('rem-min-' + remId);
  const on  = document.getElementById('rem-on-'  + remId);
  if (lbl) rem.label  = lbl.value.trim() || (_lang==='he'?'תזכורת משימות':'Task reminder');
  if (hr)  rem.hour   = Math.min(23, Math.max(0, parseInt(hr.value)  || 0));
  if (min) rem.minute = Math.min(59, Math.max(0, parseInt(min.value) || 0));
  if (on)  rem.active = on.checked;
  State.save();
  showToast(_lang==='he'?'🔔 תזכורת נשמרה':'🔔 Reminder saved');
}

function doDeleteReminder(remId) {

function doSubmitRequest(childId) {
  const title = document.getElementById('rq-title').value.trim();
  const urgency = document.getElementById('rq-urgency').value;
  let valid = true;

  if (!title) {
    document.getElementById('rq-title').classList.add('error');
    document.getElementById('rq-title-err').classList.add('show');
    valid = false;
  } else {
    document.getElementById('rq-title').classList.remove('error');
